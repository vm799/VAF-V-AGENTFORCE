<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaishali Agent Force — Agent Characters Preview</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'Inter', -apple-system, sans-serif;
    padding: 40px;
    min-height: 100vh;
  }

  h1 {
    text-align: center;
    font-size: 1.5rem;
    font-weight: 600;
    color: #2dd4bf;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    color: #64748b;
    font-size: 0.8rem;
    margin-bottom: 40px;
  }

  /* ── Agent Strip ──────────────────────────────────── */
  .strip {
    display: flex;
    gap: 12px;
    margin-bottom: 40px;
  }
  .strip-card {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: #161b22;
    border-radius: 10px;
    border: 1px solid #1e293b;
    transition: border-color 0.2s;
  }
  .strip-card:hover { border-color: var(--agent-colour); }
  .strip-name { font-size: 0.75rem; font-weight: 600; color: var(--agent-colour); }
  .strip-mood { font-size: 0.625rem; color: #94a3b8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

  /* ── State grid ───────────────────────────────────── */
  h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 16px;
    color: #94a3b8;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    margin-bottom: 40px;
  }
  .character-card {
    background: #161b22;
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    border: 1px solid #1e293b;
    border-top: 3px solid var(--agent-colour);
  }
  .character-card .label {
    font-size: 0.7rem;
    color: #64748b;
    margin-top: 8px;
  }
  .character-card .name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--agent-colour);
    margin-top: 4px;
  }
  .state-label {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 8px;
    font-size: 0.625rem;
    font-weight: 500;
    margin-top: 8px;
  }

  /* ── Animations ───────────────────────────────────── */
  @keyframes breathe {
    0%, 100% { transform: scaleY(1); }
    50%      { transform: scaleY(1.04); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    30%      { transform: translateY(-6px); }
    50%      { transform: translateY(-3px); }
    70%      { transform: translateY(-5px); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%      { opacity: 0.6; }
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(0deg); }
    25%      { transform: rotate(-5deg); }
    75%      { transform: rotate(5deg); }
  }
  @keyframes confetti-pop {
    0%   { opacity: 0; transform: scale(0) translateY(0); }
    40%  { opacity: 1; transform: scale(1.2) translateY(-8px); }
    100% { opacity: 0; transform: scale(0.6) translateY(-20px); }
  }

  .anim-idle    { animation: breathe 3s ease-in-out infinite; transform-origin: center bottom; }
  .anim-success { animation: bounce 0.8s ease-in-out infinite; transform-origin: center bottom; }
  .anim-warning { animation: wiggle 0.5s ease-in-out infinite; transform-origin: center bottom; }
  .anim-running { animation: pulse 1.2s ease-in-out infinite; transform-origin: center bottom; }

  .glow-wrap {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    position: relative;
  }
  .status-dot {
    position: absolute;
    bottom: 2px;
    right: 2px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid #161b22;
  }
</style>
</head>
<body>

<h1>Agent Characters</h1>
<p class="subtitle">Finance = Owlbert (Owl) · Content = Foxy (Fox) · Education = Whiskers (Cat) · Health = Bamboo (Panda)</p>

<!-- ── Agent Strip ─────────────────────────────────────── -->
<h2>Agent Strip (Overview Bar)</h2>
<div class="strip" id="strip"></div>

<!-- ── All States ──────────────────────────────────────── -->
<h2>Idle State</h2>
<div class="grid" id="idle-grid"></div>

<h2>Success State</h2>
<div class="grid" id="success-grid"></div>

<h2>Warning State</h2>
<div class="grid" id="warning-grid"></div>

<h2>Running State</h2>
<div class="grid" id="running-grid"></div>

<script>
// ── Agent Config ──────────────────────────────────────
const AGENTS = [
  { id: 'finance',   name: 'Owlbert',  character: 'owl',   colour: '#4ade80', glow: '#4ade8040', mood: 'All accounts healthy' },
  { id: 'content',   name: 'Foxy',     character: 'fox',   colour: '#a78bfa', glow: '#a78bfa40', mood: '3 fresh ideas today' },
  { id: 'education', name: 'Whiskers', character: 'cat',   colour: '#60a5fa', glow: '#60a5fa40', mood: 'Processed 5 items today' },
  { id: 'health',    name: 'Bamboo',   character: 'panda', colour: '#fb923c', glow: '#fb923c40', mood: 'Feeling great!' },
];

const STATES = ['idle', 'success', 'warning', 'running'];
const STATE_COLOURS = { idle: '#64748b', success: '#4ade80', warning: '#fbbf24', running: '#2dd4bf' };

// ── SVG generators ────────────────────────────────────
function owlSvg(colour, state, size) {
  const eyeOpen = state !== 'running';
  const pupils = eyeOpen
    ? `<circle cx="42" cy="35" r="3.5" fill="${colour}"/><circle cx="62" cy="35" r="3.5" fill="${colour}"/><circle cx="43" cy="34" r="1.2" fill="#fff"/><circle cx="63" cy="34" r="1.2" fill="#fff"/>`
    : `<line x1="34" y1="36" x2="46" y2="36" stroke="${colour}" stroke-width="2" stroke-linecap="round"/><line x1="54" y1="36" x2="66" y2="36" stroke="${colour}" stroke-width="2" stroke-linecap="round"/>`;
  const warn = state === 'warning' ? '<text x="78" y="18" font-size="16" fill="#fbbf24" font-weight="bold">!</text>' : '';
  const stars = state === 'success' ? `<text x="12" y="14" font-size="10" fill="#fbbf24" style="animation:confetti-pop 1s ease-out forwards">★</text><text x="76" y="10" font-size="8" fill="${colour}" style="animation:confetti-pop 1.2s ease-out 0.2s forwards">★</text>` : '';
  return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
    <ellipse cx="50" cy="60" rx="30" ry="28" fill="${colour}" opacity="0.2"/>
    <ellipse cx="50" cy="58" rx="26" ry="24" fill="${colour}" opacity="0.35"/>
    <circle cx="50" cy="38" r="22" fill="${colour}" opacity="0.5"/>
    <polygon points="33,22 28,8 38,20" fill="${colour}" opacity="0.6"/>
    <polygon points="67,22 72,8 62,20" fill="${colour}" opacity="0.6"/>
    <circle cx="40" cy="36" r="9" fill="#0f1117"/><circle cx="60" cy="36" r="9" fill="#0f1117"/>
    <circle cx="40" cy="36" r="7" fill="#1c2333"/><circle cx="60" cy="36" r="7" fill="#1c2333"/>
    ${pupils}
    <polygon points="47,42 53,42 50,48" fill="#fbbf24"/>
    <ellipse cx="50" cy="64" rx="14" ry="12" fill="${colour}" opacity="0.15"/>
    <ellipse cx="40" cy="84" rx="8" ry="3" fill="${colour}" opacity="0.4"/>
    <ellipse cx="60" cy="84" rx="8" ry="3" fill="${colour}" opacity="0.4"/>
    <circle cx="40" cy="36" r="10" fill="none" stroke="${colour}" stroke-width="1.2" opacity="0.4"/>
    <circle cx="60" cy="36" r="10" fill="none" stroke="${colour}" stroke-width="1.2" opacity="0.4"/>
    ${warn}${stars}
  </svg>`;
}

function foxSvg(colour, state, size) {
  const eyeRy = state === 'success' ? 1.5 : 4.5;
  const pupils = state !== 'success'
    ? `<circle cx="41" cy="37" r="2" fill="${colour}"/><circle cx="57" cy="37" r="2" fill="${colour}"/><circle cx="42" cy="36" r="0.8" fill="#fff"/><circle cx="58" cy="36" r="0.8" fill="#fff"/>`
    : '';
  const warn = state === 'warning' ? '<text x="76" y="18" font-size="16" fill="#fbbf24" font-weight="bold">!</text>' : '';
  const stars = state === 'success' ? `<text x="10" y="14" font-size="10" fill="#fbbf24" style="animation:confetti-pop 1s ease-out forwards">★</text><text x="74" y="12" font-size="8" fill="${colour}" style="animation:confetti-pop 1.2s ease-out 0.2s forwards">★</text>` : '';
  return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
    <path d="M 72 70 Q 90 50 85 35 Q 82 42 78 45 Q 80 55 72 65" fill="${colour}" opacity="0.35"/>
    <ellipse cx="48" cy="65" rx="24" ry="20" fill="${colour}" opacity="0.25"/>
    <ellipse cx="48" cy="40" rx="20" ry="18" fill="${colour}" opacity="0.45"/>
    <polygon points="32,28 24,8 38,22" fill="${colour}" opacity="0.55"/>
    <polygon points="64,28 72,8 58,22" fill="${colour}" opacity="0.55"/>
    <polygon points="33,26 27,12 37,23" fill="#ff9edb" opacity="0.3"/>
    <polygon points="63,26 69,12 59,23" fill="#ff9edb" opacity="0.3"/>
    <ellipse cx="48" cy="44" rx="12" ry="10" fill="${colour}" opacity="0.15"/>
    <ellipse cx="40" cy="38" rx="4" ry="${eyeRy}" fill="#0f1117"/>
    <ellipse cx="56" cy="38" rx="4" ry="${eyeRy}" fill="#0f1117"/>
    ${pupils}
    <ellipse cx="48" cy="44" rx="3" ry="2" fill="#1c2333"/>
    <path d="M 44 47 Q 48 51 52 47" fill="none" stroke="#1c2333" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="30" y1="42" x2="38" y2="43" stroke="${colour}" stroke-width="0.8" opacity="0.4"/>
    <line x1="30" y1="46" x2="38" y2="45" stroke="${colour}" stroke-width="0.8" opacity="0.4"/>
    <line x1="58" y1="43" x2="66" y2="42" stroke="${colour}" stroke-width="0.8" opacity="0.4"/>
    <line x1="58" y1="45" x2="66" y2="46" stroke="${colour}" stroke-width="0.8" opacity="0.4"/>
    <ellipse cx="36" cy="82" rx="7" ry="4" fill="${colour}" opacity="0.35"/>
    <ellipse cx="60" cy="82" rx="7" ry="4" fill="${colour}" opacity="0.35"/>
    <ellipse cx="48" cy="68" rx="10" ry="10" fill="${colour}" opacity="0.12"/>
    <line x1="62" y1="72" x2="72" y2="58" stroke="${colour}" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <circle cx="72" cy="57" r="1.5" fill="#fbbf24"/>
    ${warn}${stars}
  </svg>`;
}

function catSvg(colour, state, size) {
  const eyeRy = state === 'success' ? 1 : 3.5;
  const pupils = state !== 'success'
    ? `<circle cx="38" cy="37" r="1.8" fill="${colour}"/><circle cx="60" cy="37" r="1.8" fill="${colour}"/><circle cx="39" cy="36.5" r="0.7" fill="#fff"/><circle cx="61" cy="36.5" r="0.7" fill="#fff"/>`
    : '';
  const warn = state === 'warning' ? '<text x="76" y="18" font-size="16" fill="#fbbf24" font-weight="bold">!</text>' : '';
  const stars = state === 'success' ? `<text x="8" y="12" font-size="10" fill="#fbbf24" style="animation:confetti-pop 1s ease-out forwards">★</text><text x="76" y="10" font-size="8" fill="${colour}" style="animation:confetti-pop 1.2s ease-out 0.2s forwards">★</text>` : '';
  return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
    <path d="M 68 72 Q 85 60 88 42 Q 86 50 82 55" fill="none" stroke="${colour}" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
    <ellipse cx="48" cy="66" rx="22" ry="18" fill="${colour}" opacity="0.22"/>
    <circle cx="48" cy="40" r="20" fill="${colour}" opacity="0.4"/>
    <polygon points="32,26 22,4 40,22" fill="${colour}" opacity="0.5"/>
    <polygon points="64,26 74,4 56,22" fill="${colour}" opacity="0.5"/>
    <polygon points="33,24 26,10 39,22" fill="#ff9edb" opacity="0.2"/>
    <polygon points="63,24 70,10 57,22" fill="#ff9edb" opacity="0.2"/>
    <rect x="30" y="33" width="14" height="10" rx="3" fill="none" stroke="${colour}" stroke-width="1.5" opacity="0.7"/>
    <rect x="52" y="33" width="14" height="10" rx="3" fill="none" stroke="${colour}" stroke-width="1.5" opacity="0.7"/>
    <line x1="44" y1="38" x2="52" y2="38" stroke="${colour}" stroke-width="1" opacity="0.5"/>
    <ellipse cx="37" cy="38" rx="3" ry="${eyeRy}" fill="#0f1117"/>
    <ellipse cx="59" cy="38" rx="3" ry="${eyeRy}" fill="#0f1117"/>
    ${pupils}
    <polygon points="46,44 50,44 48,47" fill="#ff9edb" opacity="0.6"/>
    <path d="M 44 48 Q 48 51 52 48" fill="none" stroke="#1c2333" stroke-width="1" stroke-linecap="round"/>
    <line x1="26" y1="44" x2="36" y2="45" stroke="${colour}" stroke-width="0.7" opacity="0.35"/>
    <line x1="26" y1="48" x2="36" y2="47" stroke="${colour}" stroke-width="0.7" opacity="0.35"/>
    <line x1="60" y1="45" x2="70" y2="44" stroke="${colour}" stroke-width="0.7" opacity="0.35"/>
    <line x1="60" y1="47" x2="70" y2="48" stroke="${colour}" stroke-width="0.7" opacity="0.35"/>
    <rect x="22" y="70" width="14" height="10" rx="1" fill="${colour}" opacity="0.3"/>
    <line x1="29" y1="70" x2="29" y2="80" stroke="${colour}" stroke-width="1" opacity="0.5"/>
    <ellipse cx="38" cy="82" rx="6" ry="3.5" fill="${colour}" opacity="0.3"/>
    <ellipse cx="58" cy="82" rx="6" ry="3.5" fill="${colour}" opacity="0.3"/>
    ${warn}${stars}
  </svg>`;
}

function pandaSvg(colour, state, size) {
  const eyeRy = state === 'success' ? 1 : 3.5;
  const pupils = state !== 'success'
    ? `<circle cx="39" cy="37" r="2" fill="${colour}"/><circle cx="63" cy="37" r="2" fill="${colour}"/><circle cx="40" cy="36.5" r="0.8" fill="#fff"/><circle cx="64" cy="36.5" r="0.8" fill="#fff"/>`
    : '';
  const warn = state === 'warning' ? '<text x="78" y="18" font-size="16" fill="#fbbf24" font-weight="bold">!</text>' : '';
  const stars = state === 'success' ? `<text x="10" y="10" font-size="10" fill="#fbbf24" style="animation:confetti-pop 1s ease-out forwards">★</text><text x="78" y="8" font-size="8" fill="${colour}" style="animation:confetti-pop 1.2s ease-out 0.2s forwards">★</text>` : '';
  return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
    <ellipse cx="50" cy="66" rx="26" ry="22" fill="${colour}" opacity="0.2"/>
    <circle cx="50" cy="40" r="22" fill="${colour}" opacity="0.15"/>
    <circle cx="50" cy="40" r="22" fill="#e2e8f0" opacity="0.3"/>
    <circle cx="32" cy="22" r="8" fill="#1c2333" opacity="0.8"/>
    <circle cx="68" cy="22" r="8" fill="#1c2333" opacity="0.8"/>
    <circle cx="32" cy="22" r="5" fill="${colour}" opacity="0.3"/>
    <circle cx="68" cy="22" r="5" fill="${colour}" opacity="0.3"/>
    <ellipse cx="38" cy="38" rx="8" ry="7" fill="#1c2333" opacity="0.85"/>
    <ellipse cx="62" cy="38" rx="8" ry="7" fill="#1c2333" opacity="0.85"/>
    <ellipse cx="38" cy="38" rx="3.5" ry="${eyeRy}" fill="#e2e8f0"/>
    <ellipse cx="62" cy="38" rx="3.5" ry="${eyeRy}" fill="#e2e8f0"/>
    ${pupils}
    <ellipse cx="50" cy="45" rx="4" ry="2.5" fill="#1c2333"/>
    <path d="M 46 48 Q 50 52 54 48" fill="none" stroke="#1c2333" stroke-width="1.2" stroke-linecap="round"/>
    <ellipse cx="50" cy="68" rx="14" ry="12" fill="#e2e8f0" opacity="0.15"/>
    <ellipse cx="28" cy="60" rx="6" ry="10" fill="#1c2333" opacity="0.5" transform="rotate(-15 28 60)"/>
    <ellipse cx="72" cy="60" rx="6" ry="10" fill="#1c2333" opacity="0.5" transform="rotate(15 72 60)"/>
    <line x1="14" y1="54" x2="26" y2="54" stroke="${colour}" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <circle cx="14" cy="54" r="3.5" fill="${colour}" opacity="0.4"/>
    <circle cx="26" cy="54" r="3.5" fill="${colour}" opacity="0.4"/>
    <ellipse cx="40" cy="84" rx="8" ry="4" fill="#1c2333" opacity="0.5"/>
    <ellipse cx="60" cy="84" rx="8" ry="4" fill="#1c2333" opacity="0.5"/>
    <path d="M 30 30 Q 50 24 70 30" fill="none" stroke="${colour}" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
    ${warn}${stars}
  </svg>`;
}

const SVG_MAP = { owl: owlSvg, fox: foxSvg, cat: catSvg, panda: pandaSvg };

// ── Render helpers ────────────────────────────────────
function renderAvatar(agent, state, size) {
  const svgFn = SVG_MAP[agent.character];
  return `<div class="glow-wrap anim-${state}" style="background:radial-gradient(circle, ${agent.glow} 0%, transparent 70%)">
    ${svgFn(agent.colour, state, size * 0.85)}
    <div class="status-dot" style="background:${STATE_COLOURS[state]}"></div>
  </div>`;
}

// ── Build Strip ───────────────────────────────────────
const strip = document.getElementById('strip');
AGENTS.forEach(a => {
  const card = document.createElement('div');
  card.className = 'strip-card';
  card.style.setProperty('--agent-colour', a.colour);
  card.innerHTML = `
    ${renderAvatar(a, 'success', 44)}
    <div style="flex:1;min-width:0">
      <div class="strip-name">${a.name}</div>
      <div class="strip-mood">${a.mood}</div>
    </div>
  `;
  strip.appendChild(card);
});

// ── Build State Grids ─────────────────────────────────
STATES.forEach(state => {
  const grid = document.getElementById(`${state}-grid`);
  AGENTS.forEach(a => {
    const card = document.createElement('div');
    card.className = 'character-card';
    card.style.setProperty('--agent-colour', a.colour);
    card.innerHTML = `
      ${renderAvatar(a, state, 80)}
      <div class="name">${a.name}</div>
      <div class="label">${a.character}</div>
      <span class="state-label" style="background:${STATE_COLOURS[state]}22;color:${STATE_COLOURS[state]}">${state}</span>
    `;
    grid.appendChild(card);
  });
});
</script>
</body>
</html>
